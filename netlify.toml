# Netlify — @klarify/web (Next.js 14 App Router)
#
# 404 / “Page not found” after deploy: Netlify lists wrong publish folder, missing SPA
# fallback, or broken SSR integration — see:
# https://answers.netlify.com/t/support-guide-i-ve-deployed-my-site-but-i-still-see-page-not-found/125
#
# Monorepo: leave “Base directory” empty (repo root). In Netlify UI, set
# “Package directory” to `apps/web` so framework detection + this config apply
# to the Next app while `pnpm install` still runs from the workspace root.
#
# Clear any legacy “Publish directory” (e.g. apps/api/dist) in Site settings —
# this file sets publish = "apps/web/.next" so @netlify/plugin-nextjs finds the build.
#
# ---------------------------------------------------------------------------
# Why we do NOT copy SPA redirects (`/*` → `/index.html`) from static React apps:
# `/auth/callback` is implemented as `app/auth/callback/route.ts` (Route Handler).
# Serving `index.html` for that path would skip the server and break Supabase OAuth.
# Deep links and refreshes are handled by Netlify’s Next.js runtime (OpenNext).
# ---------------------------------------------------------------------------
#
# Deploy @klarify/api (Hono) on Railway/Render, or a second Netlify site whose
# build command is the API pipeline (see git history for prisma + tsc example).

[build]
  installCommand = "corepack enable && corepack prepare pnpm@9.0.0 --activate && env NODE_ENV=development pnpm install --frozen-lockfile"
  command        = "pnpm --filter @klarify/web run build"
  # @netlify/plugin-nextjs expects publish to point at the .next output directory
  # (relative to the repo root in monorepos). See:
  # https://docs.netlify.com/build/configure-builds/monorepos/
  publish        = "apps/web/.next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"
