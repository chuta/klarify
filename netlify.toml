[build]
  # pnpm exec resolves the binary from workspace node_modules without PATH issues
  command       = "pnpm exec turbo run build --filter @klarify/api"
  publish       = "apps/api/dist"

[build.environment]
  NODE_VERSION  = "20"
  PNPM_VERSION  = "9"
  # Turborepo remote cache is disabled in CI — local cache only
  TURBO_TELEMETRY_DISABLED = "1"
