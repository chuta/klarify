# Netlify deploy for @klarify/api (Hono backend).
#
# IMPORTANT: In the Netlify UI, set “Base directory” to empty (repository root).
# If it is set to apps/api, workspace installs and CLI resolution break.

[build]
  # Force a full workspace install including devDependencies used locally (tsx, vitest).
  # NODE_ENV=production on Netlify otherwise skips devDeps before our prisma/typescript deps move.
  installCommand = "corepack enable && corepack prepare pnpm@9.0.0 --activate && env NODE_ENV=development pnpm install --frozen-lockfile"

  # Use npm scripts so pnpm puts node_modules/.bin on PATH (pnpm exec prisma still fails on some CI setups).
  command        = "pnpm --filter @klarify/api run db:generate && pnpm --filter @klarify/api run build"
  publish        = "apps/api/dist"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"
