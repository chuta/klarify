[build]
  # pnpm resolves turbo from the workspace node_modules, avoiding "command not found"
  command       = "pnpm turbo run build --filter @klarify/api"
  publish       = "apps/api/dist"

[build.environment]
  NODE_VERSION  = "20"
  PNPM_VERSION  = "9"
  # Turborepo remote cache is disabled in CI — local cache only
  TURBO_TELEMETRY_DISABLED = "1"
