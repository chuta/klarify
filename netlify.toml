# Netlify — @klarify/web (Next.js 14 App Router)
#
# ───────────────────────────────────────────────────────────────────────────
# REQUIRED Netlify UI settings (Site configuration → Build & deploy → Build settings)
# ───────────────────────────────────────────────────────────────────────────
#   Base directory     : (leave empty — repo root)
#   Package directory  : apps/web        ← CRITICAL. If this is `apps/api`
#                                          (or anything else), the Next.js
#                                          plugin writes its function bundle
#                                          under that wrong workspace, which
#                                          inherits apps/api/package.json
#                                          ("type": "module") and crashes at
#                                          runtime with ERR_REQUIRE_ESM:
#                                            require() of ES Module
#                                            /var/task/apps/api/.netlify/...
#                                          The UI value OVERRIDES this file —
#                                          this toml cannot fix it.
#   Build command      : (leave empty — read from this file)
#   Publish directory  : (leave empty — read from this file)
#   Functions directory: (leave empty)
#
# If the site has stale settings from a previous API-deploy attempt, the
# safest fix is to delete the site (Site configuration → Danger zone) and
# create a fresh one with the values above.
# ───────────────────────────────────────────────────────────────────────────
#
# 404 / “Page not found” after deploy → see:
# https://answers.netlify.com/t/support-guide-i-ve-deployed-my-site-but-i-still-see-page-not-found/125
#
# We deliberately do NOT add SPA redirects (`/*` → `/index.html`):
# `/auth/callback` is `app/auth/callback/route.ts` (Route Handler). Serving
# `index.html` would skip the server and break Supabase OAuth. Deep links
# and refreshes are handled by the Next.js runtime (OpenNext) instead.
#
# Deploy @klarify/api (Hono) on Railway/Render, or a separate Netlify site
# whose package directory is `apps/api`.

[build]
  installCommand = "corepack enable && corepack prepare pnpm@9.0.0 --activate && env NODE_ENV=development pnpm install --frozen-lockfile"
  command        = "pnpm --filter @klarify/web run build"
  # @netlify/plugin-nextjs expects publish to point at the .next output directory
  # (relative to the repo root in monorepos). See:
  # https://docs.netlify.com/build/configure-builds/monorepos/
  publish        = "apps/web/.next"

# Pin the v5 OpenNext-based runtime so Netlify wires up the SSR redirects
# (the SSR “if your deploy shows no redirects, integration broke” case in
# https://answers.netlify.com/t/support-guide-i-ve-deployed-my-site-but-i-still-see-page-not-found/125).
#
# The plugin must live in apps/web/package.json (the package directory) so
# Netlify resolves the locally-installed v5+ instead of its bundled v4.x —
# v4 ships a CJS handler that crashes against the root package.json's
# "type": "module".
[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION    = "20"
  PNPM_VERSION    = "9"
  # NEXT_PUBLIC_APP_URL is baked into the client bundle at build time.
  # It must be set here (or in the Netlify dashboard) so that any non-Server
  # Action code (client components, edge config, etc.) resolves correctly.
  # The server actions derive their own origin dynamically via headers(), so
  # this value is only a fallback for them.
  NEXT_PUBLIC_APP_URL = "https://klarify.africa"
